name: Build Android APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm install
      - run: npx cap add android
      - run: npx cap sync android
      - name: Copy OM icon
        run: |
          if [ -f android-res/ic_launcher.png ]; then
            for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
              mkdir -p android/app/src/main/res/mipmap-$d
              cp android-res/ic_launcher.png android/app/src/main/res/mipmap-$d/ic_launcher.png
              cp android-res/ic_launcher.png android/app/src/main/res/mipmap-$d/ic_launcher_round.png
            done
          fi
      - name: Build APK
        run: |
          cd android && chmod +x gradlew && unset ANDROID_SDK_ROOT && ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
      - name: Package
        run: mkdir -p output && cp android/app/build/outputs/apk/debug/app-debug.apk output/AmmanTemple-v${{ github.run_number }}.apk
      - uses: actions/upload-artifact@v4
        with:
          name: AmmanTemple-APK-build-${{ github.run_number }}
          path: output/AmmanTemple-v${{ github.run_number }}.apk
          retention-days: 90
          if-no-files-found: error
